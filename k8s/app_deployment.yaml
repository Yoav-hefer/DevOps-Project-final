apiVersion: apps/v1
kind: Deployment
metadata:
  name: namegen-deployment
  labels:
    app: namegen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: namegen
  template:
    metadata:
      labels:
        app: namegen
    spec:
     containers:
      - name: namegen
        image: 878564870545.dkr.ecr.us-east-1.amazonaws.com/myapps/app:ebdeb25945ccd16bf20f256f83f770d299cf57e4
        imagePullPolicy: IfNotPresent
        env:
        - name: MONGODB_URL
          value: "mongodb://genuser:password@mongo:27017/namegen?authSource=admin"
        ports:
        - containerPort: 8080

---

apiVersion: v1
kind: Service
metadata:
  name: namegen-service
  labels:
    app: namegen
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
spec:
  type: LoadBalancer
  selector:
    app: namegen
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080

    
